  個別指導スクエア 補習管理アプリ

<html lang="ja">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>個別指導スクエア 補習管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}
html,body{height:100%}#app{height:100%;overflow-y:auto}
body{background:#f3f4f6}
/* LOGIN/SETUP */
.cp{min-height:100%;display:flex;align-items:center;justify-content:center;background:#f3f4f6}
.lcard{background:#fff;border-radius:14px;padding:36px;width:340px;text-align:center;box-shadow:0 2px 16px rgba(0,0,0,.1)}
.llogo{font-size:20px;font-weight:700;color:#111827;margin-bottom:4px}
.llogo span{color:#B91C1C}
.lsub{font-size:13px;color:#6b7280;margin-bottom:26px}
.gbtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:11px 16px;border:1.5px solid #d1d5db;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;font-weight:500;color:#374151;margin-bottom:12px}
.gbtn:hover{background:#f9fafb}
.apick{border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;text-align:left;margin-top:12px}
.aphd{font-size:12px;color:#6b7280;padding:8px 12px;background:#f9fafb;border-bottom:1px solid #e5e7eb}
.apitem{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-bottom:1px solid #f3f4f6}
.apitem:last-child{border-bottom:none}
.apitem:hover{background:#f9fafb}
.apav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#fff;flex-shrink:0}
.sucard{background:#fff;border-radius:14px;padding:24px;width:360px;max-width:95vw;box-shadow:0 2px 16px rgba(0,0,0,.1);overflow-y:auto;max-height:90vh}
.suuser{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.susec{margin-bottom:14px}
.suseclab{font-size:13px;font-weight:700;color:#111827;margin-bottom:7px}
.supills{display:flex;flex-wrap:wrap;gap:6px}
.spx{padding:7px 14px;border-radius:22px;font-size:13px;font-weight:500;border:1.5px solid #d1d5db;cursor:pointer;background:#fff;color:#374151;white-space:nowrap}
.spx.sa{background:#22C55E;color:#fff;border-color:#22C55E;font-weight:700}
.spx.ba{background:#B91C1C;color:#fff;border-color:#B91C1C;font-weight:700}
.spx.ga{background:#3B82F6;color:#fff;border-color:#3B82F6;font-weight:700}
.suconfirm{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:600;border:none;background:#e5e7eb;color:#9ca3af;cursor:default;margin-top:4px}
.suconfirm.rdy{background:#22C55E;color:#fff;cursor:pointer}
.btiny{font-size:12px;color:#9ca3af;border:none;background:none;cursor:pointer;width:100%;text-align:center;margin-top:10px;display:block}
/* APP HEADER */
.ahdr{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#fff;border-bottom:1px solid #e5e7eb}
.atitle{font-size:13px;font-weight:700;color:#111827}
.atitle span{color:#B91C1C}
.uchip{display:flex;align-items:center;gap:6px}
.uav{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff}
.hdrbtn{font-size:11px;padding:3px 9px;border:1px solid #d1d5db;border-radius:6px;background:none;cursor:pointer;color:#6b7280}
/* SCHEDULE */
.schp{display:flex;flex-direction:column;height:100%;overflow:hidden}
.schscr{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.wnav{display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 12px;background:#fff;border-bottom:1px solid #e5e7eb;flex-wrap:wrap}
.nbtn{padding:5px 12px;background:#4B5563;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500}
.wrange{font-size:13px;font-weight:600;color:#111827}
.dinput{font-size:12px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px}
.gwrap{overflow-x:auto}
table.stbl{border-collapse:collapse}
.stbl th{background:#1F2937;color:#fff;padding:6px 5px;font-size:11px;font-weight:600;text-align:center;border:1px solid #374151;white-space:nowrap;min-width:88px}
.stbl th.thT{background:#991B1B}
.tp{display:inline-block;background:#EF4444;font-size:9px;padding:1px 4px;border-radius:3px;margin-bottom:2px}
/* .brn は sticky CSS で定義済み */
.stbl td.dyt{vertical-align:top;padding:4px;border:1px solid #e5e7eb;background:#fff;min-width:88px;overflow:visible}
.stbl td.dyt.tcol{background:#fffbeb}
.cin{display:flex;flex-direction:column;gap:3px;overflow:visible}
.adc{width:22px;height:22px;border-radius:50%;background:#22C55E;color:#fff;border:none;cursor:pointer;font-size:16px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.sc{border-radius:6px;padding:5px 7px;font-size:10px;color:#fff;line-height:1.35;position:relative;cursor:pointer;transition:filter .12s}
.sc:hover{filter:brightness(1.12)}
.sc .sct{font-weight:600;font-size:10px;white-space:nowrap}
.sc .scd{margin-top:2px;font-size:10px;opacity:.92;word-break:break-all;padding-right:14px}
.sc .eh{position:absolute;bottom:3px;right:5px;font-size:8px;opacity:.7;font-style:italic}
.delbtn{position:absolute;top:50%;right:3px;transform:translateY(-50%);background:rgba(0,0,0,.35);border:none;color:#fff;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:10px;line-height:22px;text-align:center;padding:0;z-index:2;touch-action:manipulation;flex-shrink:0}
.delbtn:hover{background:rgba(0,0,0,.55)}
/* FORM */
.fpage{height:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.ffixed{position:relative;top:auto;z-index:20;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:visible}
.frow{display:flex;align-items:center;gap:6px;padding:5px 12px;border-bottom:1px solid #f3f4f6}
.hpills{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;flex:1;-webkit-overflow-scrolling:touch;touch-action:pan-x}
.hpills::-webkit-scrollbar{display:none}
.flab{font-size:11px;color:#6b7280;white-space:nowrap;flex-shrink:0;min-width:28px}
.ubar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:#f9fafb;border-top:1.5px solid #e5e7eb;min-height:46px}
.ubhint{font-size:12px;color:#9ca3af;flex:1}
.ubinfo{flex:1;min-width:0}
.ubtime{font-size:13px;font-weight:700;color:#1E40AF}
.ubtime.em{color:#92400E}
.ubstu{font-size:11px;color:#6b7280;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ubclr{border:1px solid #e5e7eb;background:#fff;cursor:pointer;font-size:11px;color:#9ca3af;padding:3px 8px;border-radius:6px;white-space:nowrap}
.ubsave{padding:9px 20px;border:none;border-radius:8px;background:#22C55E;color:#fff;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap;box-shadow:0 2px 6px rgba(34,197,94,.35);flex-shrink:0}
.ubsave:hover{background:#16A34A}
.ubsave.em{background:#F59E0B}
.ubsave.em:hover{background:#D97706}
.durinl{display:flex;align-items:center;gap:6px;flex:1;flex-wrap:wrap}
.durlab{font-size:11px;color:#6b7280;white-space:nowrap}
.durbtn{padding:7px 12px;border-radius:8px;font-size:12px;border:1.5px solid #d1d5db;cursor:pointer;background:#fff;color:#374151;font-weight:600}
.durbtn:hover{border-color:#3B82F6;background:#EFF6FF;color:#1E40AF}
.fscr{background:#fff;position:relative}
.fbody{padding:10px 12px}
.fsec{margin-bottom:12px}
.tinp{width:100%;font-size:13px;padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;background:#fff}
.legend{display:flex;align-items:center;gap:6px;font-size:11px;color:#6b7280;margin-bottom:5px;flex-wrap:wrap}
.legbox{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.fhrow{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid #f3f4f6}
.bbtn{font-size:13px;padding:4px 10px;border:1px solid #d1d5db;border-radius:6px;background:none;cursor:pointer;color:#6b7280;white-space:nowrap}
.kjval{font-size:15px;font-weight:700;color:#B91C1C;white-space:nowrap;flex:1}
.ebadge{font-size:10px;background:#F59E0B;color:#fff;padding:2px 7px;border-radius:20px;font-weight:600}
.nbadge{font-size:10px;background:#22C55E;color:#fff;padding:2px 7px;border-radius:20px;font-weight:600}
.delbf{font-size:11px;padding:4px 8px;border:1px solid #FECACA;border-radius:6px;background:#FEF2F2;color:#DC2626;cursor:pointer}
.spisms{padding:4px 10px;border-radius:20px;font-size:12px;border:1px solid #d1d5db;cursor:pointer;background:#fff;color:#374151;font-weight:500;white-space:nowrap;flex-shrink:0}
.spisms.act{background:#22C55E;color:#fff;border-color:#22C55E}
.gpsm{padding:4px 10px;border-radius:20px;font-size:12px;border:1px solid #d1d5db;cursor:pointer;background:#fff;color:#111827;font-weight:500;white-space:nowrap;flex-shrink:0}
.gpsm.act{border-color:#3B82F6;background:#EFF6FF;color:#1E40AF}
.bpsm{padding:4px 10px;border-radius:20px;font-size:12px;border:1px solid #d1d5db;cursor:pointer;background:#fff;color:#374151;font-weight:500;white-space:nowrap;flex-shrink:0}
.bpsm.act{background:#B91C1C;color:#fff;border-color:#B91C1C}
.autotag{background:#DCFCE7;color:#166534;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;white-space:nowrap}
/* ===== タイムグリッド ===== */
/* ★ 時刻ヘッダー：縦スクロールで上部固定、横スクロールはJS同期 */
.tgsh{
  position:sticky;
  top:0;
  z-index:5;
  display:flex;
  align-items:stretch;
  background:#f9fafb;
  border:1px solid #e5e7eb;
  border-bottom:none;
  border-radius:8px 8px 0 0
}
/* 左上コーナーセル（日付欄の見出し）：常に左端に固定 */
.tgcorner{
  width:50px;min-width:50px;flex-shrink:0;
  border-right:1px solid #d1d5db;
  background:#f9fafb;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:#9ca3af;
  padding:0 2px
}
/* ヘッダーのクリップ領域 */
.tghc{flex:1;overflow:hidden}
/* ヘッダーテーブル（JS で横移動） */
.tght{border-collapse:collapse;table-layout:fixed;will-change:transform}
/* 1時間単位ヘッダー：6列×21px=126px ← タイムテーブルの1時間幅に揃える（8:00〜24:00）*/
.thhour{
  font-size:10px;font-weight:700;color:#374151;
  padding:4px 4px;text-align:left;
  border-right:1px solid #d1d5db;
  border-bottom:1px solid #e5e7eb;
  white-space:nowrap;
  /* 幅は colspan=6 × 21px = 126px で自動決定 */
}
/* 10分刻みサブヘッダー */
.th10{
  font-size:7px;color:#c4c9d4;
  padding:1px 0;text-align:center;
  border-right:1px solid #f0f0f0;
  border-bottom:1px solid #e5e7eb;
  width:21px;min-width:21px
}
.th10.h30{color:#6b7280;font-weight:700;font-size:8px;border-left:1.5px solid #d1d5db}
.th10.h00{border-left:1.5px solid #d1d5db}
/* ボディ */
.tgwrap{
  overflow-x:auto;
  border:1px solid #e5e7eb;
  border-top:none;
  border-radius:0 0 8px 8px
}
.tgbody{border-collapse:collapse}
/* ★ 日付列：横スクロールでも左端に固定 */
.tdd{
  font-size:11px;padding:4px 5px;text-align:center;
  background:#f9fafb;border-right:1px solid #d1d5db;border-top:1px solid #e5e7eb;
  vertical-align:middle;white-space:nowrap;width:50px;min-width:50px;line-height:1.4;
  position:sticky;left:0;z-index:2
}
.tdd.tdt{color:#3B82F6;font-weight:700}
.tdd.psel{background:#FFF1F2;color:#B91C1C;font-weight:700;border-right:2px solid #B91C1C}
.tds{width:21px;min-width:21px;max-width:21px;height:46px;border-top:1px solid #e5e7eb;border-right:1px solid #e5e7eb;cursor:pointer;transition:background .06s}
.tds.hst{border-left:1.5px solid #d1d5db}
.tds.h30s{border-left:1px solid #cbd5e1}
.tds.prow{background:#FFF5F5}
.tds.prow:hover{background:#FECDD3}
.tds:not(.prow):hover{background:#DBEAFE}
.selm{padding:2px 1px;border-top:1px solid #e5e7eb;border-right:1px solid #2563EB;background:transparent;cursor:pointer;vertical-align:middle}
.selbar{background:#2563EB;height:42px;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px 8px;overflow:hidden;gap:2px;box-shadow:0 2px 8px rgba(37,99,235,.3)}
.sbi{color:#fff;font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;line-height:1.2;text-align:center}
.sbt{color:rgba(255,255,255,.85);font-size:9px;white-space:nowrap;line-height:1.2}
.exm{padding:2px 1px;border-top:1px solid #e5e7eb;border-right:1px solid rgba(0,0,0,.06);background:transparent;cursor:pointer;vertical-align:middle}
.exbar{height:42px;border-radius:6px;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:3px 7px;overflow:hidden;gap:1px;transition:filter .1s;box-shadow:0 2px 6px rgba(0,0,0,.12);position:relative;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:rgba(0,0,0,.1)}
.exbar:hover{filter:brightness(1.08)}
.exbr{color:rgba(255,255,255,.8);font-size:8px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.exmain{color:#fff;font-size:10px;font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.extime{color:rgba(255,255,255,.85);font-size:9px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.exstu{color:rgba(255,255,255,.7);font-size:8px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
/* 確認パネル */
.cpanel{background:#fff;border:2px solid #22C55E;border-radius:12px;margin:6px 8px;padding:0;box-shadow:0 4px 16px rgba(34,197,94,.15);display:flex;flex-direction:column;max-height:calc(100dvh - 120px);overflow:hidden}
.cpanel.em{border-color:#F59E0B;box-shadow:0 4px 16px rgba(245,158,11,.15)}
.cptitle{font-size:14px;font-weight:700;color:#111827;margin-bottom:8px;text-align:center;padding-top:12px}
.cprow{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:0.5px solid #f3f4f6}
.cprow:last-of-type{border-bottom:none}
.cplab{font-size:11px;color:#6b7280;width:46px;flex-shrink:0;padding-top:5px;font-weight:500}
.cpval{font-size:13px;color:#111827;font-weight:500;padding-top:3px;flex:1}
.cppills{display:flex;flex-wrap:wrap;gap:4px;flex:1}
.cpill{padding:4px 10px;border-radius:20px;font-size:12px;border:1px solid #d1d5db;cursor:pointer;background:#fff;color:#374151;font-weight:500}
.cpill:hover{border-color:#3B82F6;color:#1D4ED8}
.cpill.act{background:#22C55E;color:#fff;border-color:#22C55E;font-weight:700}
.cetbtn{margin-top:4px;font-size:11px;color:#3B82F6;background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;display:block}
.cpbtns{display:flex;gap:8px;padding:10px 16px;border-top:1px solid #e5e7eb;background:#fff;border-radius:0 0 10px 10px;flex-shrink:0}
.cpok{flex:1;padding:11px;border:none;border-radius:10px;background:#22C55E;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.cpok:hover{background:#16A34A}
.cpok.em{background:#F59E0B}
.cpcancel{flex:1;padding:11px;border:1px solid #e5e7eb;border-radius:10px;background:#fff;color:#6b7280;font-size:14px;font-weight:500;cursor:pointer}
.cpcancel:hover{background:#f9fafb}

/* ===== スケジュール画面 sticky ヘッダー・列 ===== */
/* wnav + 日付ヘッダーをまとめて上部固定 */
.sch-sticky{position:sticky;top:0;z-index:9;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.06)}
/* 日付ヘッダー行（校舎コーナー + 日付セル） */
.sch-hdr-row{display:flex;background:#1F2937}
/* 校舎コーナー（左上固定セル） */
.sch-corner{
  flex-shrink:0;
  background:#1F2937;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;color:#fff;
  border-right:1px solid #374151;
  padding:6px 4px
}
/* ヘッダーのクリップ領域（overflow:hidden でテーブルをクリップ） */
.sch-hdr-clip{flex:1;overflow:hidden}
/* ヘッダーテーブル（JS で translateX） */
.sch-ht{border-collapse:collapse;table-layout:fixed;will-change:transform}
/* 日付セル */
.sch-th{
  width:88px;min-width:88px;
  padding:6px 4px;text-align:center;
  border-right:1px solid #374151;
  background:#1F2937;color:#fff;
  vertical-align:middle
}
.sch-th.tod{background:#991B1B}
/* 日付（上段・大きく） */
.sch-date{font-size:13px;font-weight:700;line-height:1.2;display:block}
/* 曜日（下段・小さく） */
.sch-dow{font-size:11px;font-weight:400;opacity:.8;display:block;margin-top:2px}
.sch-today-tag{display:inline-block;background:#EF4444;font-size:9px;padding:1px 4px;border-radius:3px;vertical-align:middle}
/* ★ 校舎名列：横スクロールしても左端に固定 */
.brn{
  background:#B91C1C;color:#fff;font-size:16px;font-weight:700;
  padding:6px 4px;text-align:center;
  border:1px solid #991B1B;min-width:58px;
  position:sticky;left:0;z-index:2;  /* ← 左固定 */
  height:60px;vertical-align:middle
}

/* スケジュール画面フィルター */
.sch-th-sel{background:#7F1D1D !important}
.sch-th-sel .sch-date,.sch-th-sel .sch-dow{color:#fff}
.sch-fsel-dot{display:inline-block;width:5px;height:5px;background:#FCD34D;border-radius:50%;margin-left:3px;vertical-align:middle}
.noclick{cursor:default}


.flt-badge{font-size:10px;padding:1px 5px;border-radius:8px;color:#fff;margin-left:4px}

.del-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.del-modal{background:#fff;border-radius:14px;padding:22px 20px;width:100%;max-width:320px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.del-modal-title{font-size:15px;font-weight:700;color:#111827;margin-bottom:10px;text-align:center}
.del-modal-info{background:#f9fafb;border-radius:8px;padding:10px 12px;margin-bottom:16px;font-size:13px;color:#374151;line-height:1.6}
.del-modal-btns{display:flex;gap:8px}
.del-modal-ok{flex:1;padding:11px;border:none;border-radius:10px;background:#DC2626;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.del-modal-ok:hover{background:#B91C1C}
.del-modal-cancel{flex:1;padding:11px;border:1px solid #e5e7eb;border-radius:10px;background:#fff;color:#6b7280;font-size:14px;font-weight:500;cursor:pointer}
.del-modal-cancel:hover{background:#f9fafb}

.undo-toast{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  background:#1F2937;color:#fff;
  border-radius:10px;padding:10px 16px;
  display:flex;align-items:center;gap:12px;
  font-size:13px;z-index:200;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
  white-space:nowrap;
  animation:slideUp .2s ease
}
.undo-btn{
  padding:5px 12px;border:1.5px solid #fff;border-radius:6px;
  background:none;color:#fff;cursor:pointer;font-size:12px;font-weight:700
}
.undo-btn:hover{background:rgba(255,255,255,.15)}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ツールチップ */
.sc{position:relative;overflow:visible;width:max-content;min-width:100%}
.sc-tip{
  display:none;
  position:fixed;

// ===== タイムグリッド用スクロール同期 =====
function setupWeekSwipe(){
  var THRESH=50,LOCK=8;
  var wrap=document.getElementById('tgW');
  if(!wrap)return;
  var sx=null,sy=null,dir=null;
  // タッチ：日付ラベル列（.tdd）上でのみ縦スワイプを検出（グリッドの操作と干渉しない）
  wrap.addEventListener('touchstart',function(e){
    var t=e.target.closest?e.target.closest('.tdd'):null;
    if(!t){sx=null;return;}
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;dir=null;
  },{passive:true});
  wrap.addEventListener('touchmove',function(e){
    if(sx===null)return;
    var dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
    if(dir===null&&(Math.abs(dx)>LOCK||Math.abs(dy)>LOCK)){
      dir=Math.abs(dy)>Math.abs(dx)?'v':'h';
    }
    if(dir==='v')e.preventDefault();
  },{passive:false});
  wrap.addEventListener('touchend',function(e){
    if(sx===null||dir!=='v'){sx=null;dir=null;return;}
    var dy=e.changedTouches[0].clientY-sy;
    sx=null;dir=null;
    if(Math.abs(dy)>=THRESH){dy>0?pWk():nWk();}
  },{passive:true});
  wrap.addEventListener('touchcancel',function(){sx=null;dir=null;});

  // ピンチズーム（スマホ）
  var pinchDist0=null;
  var slot0=W_SLOT;
  wrap.addEventListener('touchstart',function(e){
    if(e.touches.length===2){
      var dx=e.touches[0].clientX-e.touches[1].clientX;
      var dy=e.touches[0].clientY-e.touches[1].clientY;
      pinchDist0=Math.sqrt(dx*dx+dy*dy);
      slot0=W_SLOT;
    }
  },{passive:true});
  wrap.addEventListener('touchmove',function(e){
    if(e.touches.length!==2||!pinchDist0)return;
    e.preventDefault();
    var dx=e.touches[0].clientX-e.touches[1].clientX;
    var dy=e.touches[0].clientY-e.touches[1].clientY;
    var dist=Math.sqrt(dx*dx+dy*dy);
    var newSlot=Math.round(slot0*(dist/pinchDist0));
    newSlot=Math.max(10,Math.min(42,newSlot));
    if(newSlot!==W_SLOT){
      var sc=getSc();W_SLOT=newSlot;R();restSc(sc);
    }
  },{passive:false});
  wrap.addEventListener('touchend',function(){pinchDist0=null;});

  // Ctrl+ホイール / Macトラックパッドピンチズーム（PC）
  function _tgWheel(e){
    var tgw=document.getElementById('tgW');
    if(!tgw||!tgw.contains(e.target))return;
    if(!e.ctrlKey&&e.type==='wheel')return;
    e.preventDefault();
    var delta=e.deltaY!==undefined?e.deltaY:0;
    var newSlot=W_SLOT+(delta<0?2:-2);
    newSlot=Math.max(10,Math.min(42,newSlot));
    if(newSlot!==W_SLOT){var sc=getSc();W_SLOT=newSlot;R();restSc(sc);}
  }
  document.addEventListener('wheel',_tgWheel,{passive:false});
  document.addEventListener('gesturechange',function(e){
    var tgw=document.getElementById('tgW');
    if(!tgw)return;
    e.preventDefault();
    var newSlot=e.scale>1?Math.min(42,W_SLOT+2):Math.max(10,W_SLOT-2);
    if(newSlot!==W_SLOT){var sc=getSc();W_SLOT=newSlot;R();restSc(sc);}
  },{passive:false});

  // PC：日付ラベル列上でのドラッグでも週移動
  var msy=null;
  wrap.addEventListener('mousedown',function(e){
    var t=e.target.closest?e.target.closest('.tdd'):null;
    if(!t)return;
    msy=e.clientY;
  });
  document.addEventListener('mouseup',function(e){
    if(msy===null)return;
    var dy=e.clientY-msy;msy=null;
    if(Math.abs(dy)>=THRESH){dy>0?pWk():nWk();}
  });
}
function setupTGSync(){
  var wrap=document.getElementById('tgW');
  var hdrTbl=document.getElementById('tgHT');
  if(!wrap||!hdrTbl)return;
  wrap.addEventListener('scroll',function(){
    hdrTbl.style.transform='translateX(-'+this.scrollLeft+'px)';
  },{passive:true});

  // ★ ドラッグで開始時刻を変更（PC:クリックドラッグ / スマホ:長押し後ドラッグ）
  var dragging=false,dragTimer=null,dragReady=false;
  var touchStartX=0,touchStartY=0;
  var W_DD=50;

  function getSlotFromEvent(e){
    var rect=wrap.getBoundingClientRect();
    var cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left+wrap.scrollLeft;
    var cy=(e.touches?e.touches[0].clientY:e.clientY)-rect.top+wrap.scrollTop;
    var slot=Math.floor((cx-W_DD)/W_SLOT);
    if(slot<0)slot=0;if(slot>=TSN)slot=TSN-1;
    var rows=wrap.querySelectorAll('tr[data-dt]');
    var dt=null;
    for(var i=0;i<rows.length;i++){
      var r=rows[i];
      if(cy>=r.offsetTop&&cy<r.offsetTop+r.offsetHeight){dt=r.getAttribute('data-dt');break;}
    }
    return{slot:slot,dt:dt};
  }
  function applySlot(e){
    if(cfOpen)return;
    var info=getSlotFromEvent(e);
    if(!info.dt)return;
    if(info.slot===tS&&info.dt===tR)return;
    var sc=getSc();
    tR=info.dt;tS=info.slot;
    if(!_customDur){if(fGr){var ds=getDurs(fGr);dur=ds.length===1?ds[0]:null;}else dur=null;}
    R();restSc(sc);
  }

  // === PC（マウス）: クリックしたままドラッグ ===
  wrap.addEventListener('mousedown',function(e){
    if(e.button!==0)return;
    // data-tip要素（予定バー）・日付ラベル列はドラッグ対象外
    var _el=e.target;while(_el&&_el!==wrap){if(_el.getAttribute&&(_el.getAttribute('data-tip')||_el.classList.contains('tdd')))return;_el=_el.parentElement;}
    dragging=true;applySlot(e);
  });
  wrap.addEventListener('mousemove',function(e){
    if(!dragging)return;
    applySlot(e);
  });
  wrap.addEventListener('mouseup',function(){dragging=false;});
  wrap.addEventListener('mouseleave',function(){dragging=false;});

  // === スマホ（タッチ）: 長押し後ドラッグ ===
  wrap.addEventListener('touchstart',function(e){
    if(cfOpen)return;
    // data-tip要素（予定バー）・日付ラベル列はドラッグ対象外
    var _el=e.target;while(_el&&_el!==wrap){if(_el.getAttribute&&(_el.getAttribute('data-tip')||_el.classList.contains('tdd')))return;_el=_el.parentElement;}
    touchStartX=e.touches[0].clientX;
    touchStartY=e.touches[0].clientY;
    dragReady=false;dragging=false;
    // 400ms長押しでドラッグモード開始
    dragTimer=setTimeout(function(){
      dragReady=true;
      // 長押し開始位置で時刻を設定
      applySlot({touches:[{clientX:touchStartX,clientY:touchStartY}]});
    },400);
  },{passive:true});
  wrap.addEventListener('touchmove',function(e){
    var dx=Math.abs(e.touches[0].clientX-touchStartX);
    var dy=Math.abs(e.touches[0].clientY-touchStartY);
    // 少し動いたらタイマーキャンセル（長押し判定を防ぐ）
    if(!dragReady&&(dx>8||dy>8)){
      clearTimeout(dragTimer);dragTimer=null;
    }
    if(!dragReady)return;
    e.preventDefault();
    applySlot(e);
  },{passive:false});
  wrap.addEventListener('touchend',function(){
    clearTimeout(dragTimer);dragTimer=null;
    dragReady=false;dragging=false;
  });
  wrap.addEventListener('touchcancel',function(){dragging=false;lockDir=null;});
}

function buildRanges(dt){
  var uName=cu?cu.name:'';
  return S.filter(function(s){
    if(s.ins!==uName||s.dt!==dt||s.id===editId)return false;
    var st=Math.round(t2sl(s.s)),len=Math.round((t2m(s.e)-t2m(s.s))/TSD);
    if(st<0||st+len>TSN)return false;
    return true; // 選択中でも自分の予定を常に表示
  }).map(function(s){return{start:Math.round(t2sl(s.s)),len:Math.round((t2m(s.e)-t2m(s.s))/TSD),s:s};})
  .sort(function(a,b){return a.start-b.start;});
}
function tgRows(dates){

          +'<div class="selbar"><div class="sbi">'+(parts.length?parts.join('　'):'設定中')+'</div>'
          +'<div class="sbt">'+m2s(sl2m(tS))+'〜'+m2s(sl2m(tS)+dur)+'</div></div></td>';
        i+=dur/TSD;continue;
      }
      var found=null;for(var k=0;k<ranges.length;k++){if(ranges[k].start===i){found=ranges[k];break;}}
      if(found){
        var s=found.s,col=SCOLD[s.sj]||'#6B7280';

          +'<button onclick="event.stopPropagation();showTipModal('+s.id+',event)" style="position:absolute;inset:0;width:100%;height:100%;background:none;border:none;cursor:pointer;z-index:1;padding:0;text-align:left;color:inherit">'

          +'</button>'
          +(canEdit(s.ins)?'<button onclick="(function(e){e.stopPropagation();delS('+s.id+',e);})(event)" style="position:absolute;top:50%;right:3px;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.35);border:none;color:#fff;cursor:pointer;font-size:10px;line-height:22px;text-align:center;padding:0;z-index:2">×</button>':'')
          +'</div></td>';
        i+=found.len;continue;
      }
      var sm=sl2m(i),mm=sm%60;
      var bc=mm===0?' hst':mm===30?' h30s':'';
      cells+='<td class="tds'+bc+(isPre?' prow':'')+'" onclick="clickSlot(\''+dt+'\','+i+')" title="'+m2s(sm)+'"></td>';
      i++;
    }
    return'<tr data-dt="'+dt+'">'
      +'<td class="tdd'+tod+(isPre?' psel':'')+'">'
      +(isPre?'<span style="font-size:8px;background:#B91C1C;color:#fff;border-radius:2px;padding:0 2px;display:block;margin-bottom:1px">追加中</span>':'')
      +(d.getMonth()+1)+'/'+d.getDate()+'<br><span style="font-size:10px">('+DY[d.getDay()]+')</span></td>'+cells+'</tr>';
  }).join('');
}

function rCalModal(){
  var DAYS=['日','月','火','水','木','金','土'];
  var MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  var first=new Date(calY,calM,1).getDay(); // 月初の曜日
  var last=new Date(calY,calM+1,0).getDate(); // 月末日
  var today=new Date(),ty=today.getFullYear(),tm=today.getMonth(),td=today.getDate();
  // 現在週の日付
  var wkDates={};var dates=wkd();for(var i=0;i<dates.length;i++){wkDates[fd(dates[i])]=true;}
  var cells='';var day=1;
  for(var row=0;row<6;row++){
    cells+='<tr>';
    for(var col=0;col<7;col++){
      var cellDay=row*7+col-first+1;
      if(cellDay<1||cellDay>last){
        cells+='<td style="padding:6px"></td>';
      } else {
        var isToday=(calY===ty&&calM===tm&&cellDay===td);
        var dt2=calY+'-'+('0'+(calM+1)).slice(-2)+'-'+('0'+cellDay).slice(-2);
        var inWk=wkDates[dt2];

        var fw=isToday||inWk?'700':'400';
        cells+='<td onclick="calSel('+calY+','+calM+','+cellDay+')" style="padding:5px 2px;text-align:center;cursor:pointer;border-radius:50%">'
          +'<div style="width:28px;height:28px;border-radius:50%;background:'+bg+';color:'+fc+';font-weight:'+fw+';font-size:13px;display:flex;align-items:center;justify-content:center;margin:0 auto">'+cellDay+'</div>'
          +'</td>';
      }
    }
    cells+='</tr>';
    if(day>last)break;

  return'<div class="del-modal-overlay" onclick="closeCal()" style="z-index:150">'
    +'<div class="del-modal" onclick="event.stopPropagation()" style="max-width:300px;padding:16px">'+'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'

    +cells
    +'</table>'

function setupSchSync(){
  var wrap=document.getElementById('schW');
  var hdrTbl=document.getElementById('schHT');
  if(!wrap||!hdrTbl)return;
  // ボディスクロール → ヘッダー同期
  wrap.addEventListener('scroll',function(){
    hdrTbl.style.transform='translateX(-'+this.scrollLeft+'px)';
  },{passive:true});
  // 今日の列を中央に
  var dates=wkd();
  var isPC=window.innerWidth>=768;
  var W_BR=isPC?90:60;
  var dispDates2=schFDt.length?dates.filter(function(d){return schFDt.indexOf(fd(d))>=0;}):dates;
  var W_DT=isPC?Math.min(200,Math.max(96,Math.floor((window.innerWidth-W_BR-20)/dispDates2.length))):96;
  var todayIdx=-1;
  for(var i=0;i<dates.length;i++){if(isTd(dates[i])){todayIdx=i;break;}}
  if(todayIdx>=0){
    var center=wrap.clientWidth/2;
    var targetX=W_BR+todayIdx*W_DT+W_DT/2-center;
    wrap.scrollLeft=Math.max(0,targetX);
    hdrTbl.style.transform='translateX(-'+wrap.scrollLeft+'px)';
  }
}
// ★ スワイプ・ドラッグで週移動（日付ヘッダーのみ）
function setupSchGesture(){
  var THRESH=60;
  var LOCK=8;

  // PC・スマホ共通：日付ヘッダー行のみでスワイプ検出
  // （グリッド本体の横スクロールと干渉しない）
  var hdr=document.querySelector('.sch-hdr-row');
  if(!hdr)return;
  hdr.style.userSelect='none';

  // ---- スマホ：日付ヘッダー上でスワイプ ----
  var sx=null,sy=null,dir=null;
  hdr.addEventListener('touchstart',function(e){
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;dir=null;
  },{passive:true});
  hdr.addEventListener('touchmove',function(e){
    if(sx===null)return;
    var dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
    if(dir===null&&(Math.abs(dx)>LOCK||Math.abs(dy)>LOCK)){
      dir=Math.abs(dx)>Math.abs(dy)?'h':'v';
    }
    if(dir==='h')e.preventDefault();
  },{passive:false});
  hdr.addEventListener('touchend',function(e){
    if(sx===null||dir!=='h'){sx=null;dir=null;return;}
    var dx=e.changedTouches[0].clientX-sx;
    sx=null;dir=null;
    if(Math.abs(dx)>=THRESH){
      var d=new Date(wk);d.setDate(d.getDate()+(dx<0?7:-7));wk=d;R();
    }
  },{passive:true});

  // ---- PC：日付ヘッダー上でドラッグ ----
  hdr.style.cursor='ew-resize';
  var msx=null,msy=null;
  hdr.addEventListener('mousedown',function(e){
    if(e.button===0||e.button===2){msx=e.clientX;msy=e.clientY;e.preventDefault();}
  });
  hdr.addEventListener('contextmenu',function(e){e.preventDefault();});
  document.addEventListener('mouseup',function(e){
    if(msx===null)return;
    var dx=e.clientX-msx,dy=e.clientY-msy;msx=null;
    if(Math.abs(dx)>=THRESH&&Math.abs(dx)>Math.abs(dy)*2){
      var d=new Date(wk);d.setDate(d.getDate()+(dx<0?7:-7));wk=d;R();
    }
  });
}
// ツールチップ：PC=ホバー、スマホ=タップ
function setupTooltips(){
  var t=document.getElementById('sc-tooltip');
  var els=document.querySelectorAll('[data-tip]');
  var hasMouse=window.matchMedia&&window.matchMedia('(pointer:fine)').matches;
  for(var i=0;i<els.length;i++){
    (function(el){
      // PC（マウスあり）：ホバーでツールチップ
      if(hasMouse&&t){
        el.addEventListener('mouseenter',function(){
          t.innerHTML=(el.getAttribute('data-tip')||'').replace(/\|/g,'<br>');
          t.style.display='block';
        });
        el.addEventListener('mousemove',function(e){
          var tw=t.offsetWidth||200,th=t.offsetHeight||100;
          var lx=e.clientX+14,ly=e.clientY-th-10;
          if(ly<8)ly=e.clientY+20;
          if(lx+tw>window.innerWidth-8)lx=e.clientX-tw-14;
          t.style.left=lx+'px';t.style.top=ly+'px';
        });
        el.addEventListener('mouseleave',function(){t.style.display='none';});
      }
    })(els[i]);
  }
}

function R(){
  var _m=document.getElementById('sc-tip-modal');if(_m)_m.remove();
  var _t=document.getElementById('sc-tooltip');if(_t)_t.style.display='none';
  var main=view==='register'?rRegister():
    (!cu||view==='login')?rLogin():
    view==='setup'?rSuCard(false):
    view==='settings'?rSuCard(true):
    view==='sch'?rSch():rForm();
  var toast=undoMsg?'<div class="undo-toast"><span>'+undoMsg+'</span><button class="undo-btn" onclick="undo()">↩ 元に戻す</button></div>':'';
  document.getElementById('app').innerHTML=main+(delConfId!==null?rDelModal():'')+(delAccId!==null?rAccDelModal():'')+(calOpen?rCalModal():'')+toast;
  if(view==='form'){
    requestAnimationFrame(setupTGSync);
    requestAnimationFrame(setupWeekSwipe);
    // セル幅をW_SLOTに動的更新
    requestAnimationFrame(function(){
      var style=document.getElementById('tgSlotStyle');
      if(!style){style=document.createElement('style');style.id='tgSlotStyle';document.head.appendChild(style);}
      style.textContent='.th10,.th30{width:'+W_SLOT+'px;min-width:'+W_SLOT+'px}.tds{width:'+W_SLOT+'px;min-width:'+W_SLOT+'px;max-width:'+W_SLOT+'px}';
    });
    if(!_skipAutoScroll){
      // 初期スクロール：時刻選択済みならその位置、未選択なら16:00を左端に
      var _scPos=tS!==null?Math.max(0,Math.round(tS)*W_SLOT-80):48*W_SLOT;
      requestAnimationFrame(function(){
        var tw=document.getElementById('tgW');if(!tw)return;
        tw.scrollLeft=_scPos;
      });
      setTimeout(function(){
        var tw=document.getElementById('tgW');if(!tw)return;
        tw.scrollLeft=_scPos;
      },200);
    }
    _skipAutoScroll=false;
    requestAnimationFrame(function(){
      var ff=document.querySelector('.ffixed');
      var tgsh=document.querySelector('.tgsh');
      if(ff&&tgsh)tgsh.style.top='0px';
    });
    var _sd=tR||fDate;
    if(_sd){setTimeout(function(){
      try{
        var scr=document.querySelector('.fpage');
        var ffixed=document.querySelector('.ffixed');
        var tgsh=document.querySelector('.tgsh');
        var row=document.querySelector('tr[data-dt="'+_sd+'"]');
        if(!scr||!row)return;
        // offsetParent チェーンで row の fpage からの絶対オフセットを計算
        var top=0,el=row;
        while(el&&el!==scr){top+=el.offsetTop;el=el.offsetParent;}
        var headerH=(ffixed?ffixed.offsetHeight:0)+(tgsh?tgsh.offsetHeight:0);
        scr.scrollTop=top-headerH;
      }catch(e){}
    },100);}
  }
  if(view==='sch'){requestAnimationFrame(setupSchSync);requestAnimationFrame(setupSchGesture);
    // ログイン直後の初回のみ：フィルター未指定時にスクロールで隠す
    if(_schFirstLoad){
      _schFirstLoad=false;
      setTimeout(function(){
        var hasFilter=schFBr.length>0||schFDt.length>0||schFIns.length>0;
        var hasOpen=schNavOpen||schBrOpen||schInsOpen;
        if(hasFilter||hasOpen)return;
        var scr=document.querySelector('.schscr');
        var sticky=document.querySelector('.sch-sticky');
        if(scr&&sticky){scr.scrollTop=sticky.offsetTop;}
      },100);
    }
  }
  if(!cu)requestAnimationFrame(function(){var el=document.getElementById('loginEmailInput');if(el){el.focus();el.onkeydown=function(e){if(e.key==='Enter')loginWithEmail();};};}); 
  requestAnimationFrame(setupTooltips);
}
