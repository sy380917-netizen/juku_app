<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個別指導スクエア 補習管理</title>
    <style>
        /* 強制的な横並び設定 */
        .controls-row { display: flex; align-items: center; gap: 8px; padding: 10px; background: #f9fafb; border-bottom: 1px solid #e5e7eb; }
        .durbtn { padding: 8px 16px; border: 1px solid #d1d5db; border-radius: 8px; background: #fff; cursor: pointer; font-size: 14px; }
        .camera-btn { padding: 8px 16px; border: 1px solid #3B82F6; border-radius: 8px; background: #EFF6FF; color: #1E40AF; cursor: pointer; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="app">
        <div class="controls-row">
            <button class="durbtn" onclick="showCustomDur()">時間設定</button>
            <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
            <button class="camera-btn" onclick="document.getElementById('cameraInput').click()">📷 撮影</button>
        </div>
        <div id="main-content"></div>
    </div>

    <script>
        // --- 以前のプログラムをここに記述してください ---
        function showCustomDur() {
            alert("時間設定メニューが開きます");
        }
    </script>
</body>
</html>
